name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Restrict default GITHUB_TOKEN permissions (principle of least privilege)
permissions:
  contents: read

# Prevent resource abuse from multiple concurrent runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['min', '1.26']

    steps:
    - name: Harden Runner
      if: matrix.os == 'ubuntu-latest'
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: ${{ matrix.go != 'min' && matrix.go || '' }}
        go-version-file: 'go.mod'
        cache: true

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./charset ./decoder ./encoder ./gedcom ./merge ./parser ./validator ./version
      shell: bash

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.26'
        cache: true

    - name: Generate coverage
      run: go test -coverprofile=coverage.out -covermode=atomic ./charset ./decoder ./encoder ./gedcom ./merge ./parser ./validator ./version

    - name: Check coverage thresholds
      uses: vladopajic/go-test-coverage@a93b868a4cbcbf18dc3781650fad241f0020e609 # v2
      with:
        profile: coverage.out
        local-prefix: github.com/cacack/gedcom-go/v2
        threshold-file: 0
        threshold-package: 85
        threshold-total: 85

    - name: Per-package coverage report
      run: |
        echo "## Per-Package Coverage Report"
        echo ""
        echo "| Package | Coverage | Status |"
        echo "|---------|----------|--------|"
        for pkg in charset decoder encoder gedcom merge parser validator version; do
          COV=$(go tool cover -func=coverage.out | grep "github.com/cacack/gedcom-go/v2/$pkg" | tail -1 | awk '{print $3}')
          PCT=$(echo "$COV" | sed 's/%//')
          if (( $(echo "$PCT >= 85.0" | bc -l) )); then
            echo "| $pkg | $COV | ✅ |"
          else
            echo "| $pkg | $COV | ❌ |"
          fi
        done
        echo ""
        TOTAL=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}')
        echo "**Total: $TOTAL**"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.26'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
      with:
        version: v2.7.2

  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.26'

    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go files must be formatted with gofmt. Please run:"
          echo "  gofmt -w ."
          gofmt -l .
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Check module path matches latest tag major
      run: |
        git fetch --tags --depth=1 origin
        ./scripts/check-module-path.sh

  # Dependency review - blocks PRs introducing vulnerable dependencies
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Dependency Review
      uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
      with:
        fail-on-severity: high
        allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, 0BSD, CC0-1.0, Unlicense
        # golang.org/x/text has BSD-3-Clause + Google patent grant, allow explicitly
        # vladopajic/go-test-coverage is GPL-3.0 but only used as CI action, not a library dependency
        allow-dependencies-licenses: pkg:golang/golang.org/x/text, pkg:githubactions/vladopajic/go-test-coverage

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 0  # Full history for gitleaks

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.26'

    - name: Verify dependencies
      run: go mod verify

    - name: Run govulncheck
      uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
      with:
        go-version-file: go.mod
        repo-checkout: false
        output-format: sarif
        output-file: govulncheck-results.sarif

    - name: Upload govulncheck results to GitHub Security
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
      if: success() || failure()
      with:
        sarif_file: govulncheck-results.sarif
        category: govulncheck

    - name: Run gosec
      uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770 # master (docker: 2.25.0)
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results to GitHub Security
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
      if: success() || failure()
      with:
        sarif_file: gosec-results.sarif
        category: gosec

    # Secret detection
    - name: Detect secrets (gitleaks)
      uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
      continue-on-error: true  # Don't block other scans
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Trivy: Filesystem vulnerability and misconfiguration scanning
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
      continue-on-error: true  # Produce SARIF even on findings
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
      if: success() || failure()
      with:
        sarif_file: trivy-results.sarif
        category: trivy

    # osv-scanner: Full-lockfile OSV vulnerability scan (complements govulncheck's reachability analysis)
    - name: Run osv-scanner
      uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
      continue-on-error: true  # Non-blocking initially; promote to blocking after evaluation period
      with:
        scan-args: |-
          --recursive
          --format=sarif
          --output-file=osv-scanner-results.sarif
          ./

    - name: Upload osv-scanner results to GitHub Security
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
      if: success() || failure()
      with:
        sarif_file: osv-scanner-results.sarif
        category: osv-scanner

    # Semgrep: Rule-based static analysis
    - name: Semgrep scan
      continue-on-error: true  # Produce SARIF even on findings
      run: |
        docker run --rm -v "${PWD}:/src" \
          returntocorp/semgrep semgrep \
          --config p/security-audit \
          --config p/secrets \
          --config p/golang \
          --sarif --output /src/semgrep.sarif \
          /src

    - name: Upload Semgrep results to GitHub Security
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
      if: success() || failure()
      with:
        sarif_file: semgrep.sarif
        category: semgrep

  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: '1.26'

    - name: Build parse example
      run: go build -o /tmp/example-parse ./examples/parse

    - name: Build encode example
      run: go build -o /tmp/example-encode ./examples/encode

    - name: Build query example
      run: go build -o /tmp/example-query ./examples/query

    - name: Build validate example
      run: go build -o /tmp/example-validate ./examples/validate

    - name: Run parse example
      run: |
        if [ -f testdata/gedcom-5.5/minimal.ged ]; then
          /tmp/example-parse testdata/gedcom-5.5/minimal.ged
        fi

  api-compatibility:
    name: API Compatibility Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0  # Full history for tags and commits

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'

      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@v0.0.0-20260410095643-746e56fc9e2f

      - name: Check API compatibility
        run: |
          # Get latest release tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "✅ No release tags found, skipping API compatibility check"
            exit 0
          fi

          echo "Comparing API against $LATEST_TAG"

          # Clone old version to temp directory (worktrees have issues with apidiff)
          OLD_DIR=$(mktemp -d)
          git clone --depth 1 --branch "$LATEST_TAG" "https://github.com/${{ github.repository }}.git" "$OLD_DIR" --quiet
          trap "rm -rf '$OLD_DIR'" EXIT

          # Skip apidiff when the module path itself changed (e.g., v1 -> v2 path bump).
          # Different module paths are different modules per Go's Semantic Import Versioning,
          # so apidiff would report every type as "changed" — not a meaningful comparison.
          OLD_MODULE=$(awk '/^module / {print $2}' "$OLD_DIR/go.mod")
          NEW_MODULE=$(awk '/^module / {print $2}' go.mod)
          if [ "$OLD_MODULE" != "$NEW_MODULE" ]; then
            echo "✅ Module path changed ($OLD_MODULE -> $NEW_MODULE); skipping apidiff."
            echo "   The v$LATEST_TAG module and the current module are distinct under"
            echo "   Go's Semantic Import Versioning rules and can coexist."
            exit 0
          fi

          # Export old API to file, then compare against current
          # This is more reliable than comparing directories directly
          API_FILE=$(mktemp)
          (cd "$OLD_DIR" && go mod download && apidiff -m -w "$API_FILE" .)
          go mod download

          # Run apidiff comparing exported API against current
          # Use set +e to prevent immediate exit on non-zero return
          set +e
          APIDIFF_OUT=$(apidiff -m "$API_FILE" . 2>&1)
          APIDIFF_STATUS=$?
          set -e

          # Fail if apidiff itself errored (not just found incompatibilities)
          if [ $APIDIFF_STATUS -ne 0 ] && ! echo "$APIDIFF_OUT" | grep -q "Incompatible changes:"; then
            echo "::error::apidiff failed to run:"
            echo "$APIDIFF_OUT"
            exit 1
          fi

          # Check for incompatible (breaking) changes
          if echo "$APIDIFF_OUT" | grep -q "Incompatible changes:"; then
            echo "⚠️  Breaking API changes detected:"
            echo "$APIDIFF_OUT"
            echo ""

            # Check if commits declare breaking change via conventional commits
            # Look for: feat!:, fix!:, refactor!:, or BREAKING CHANGE: in commit body
            # Check both branch-specific commits AND commits on main since the last release,
            # since a breaking change may already be merged to main but not yet released.
            COMMITS=$(git log --format="%s%n%b" "$LATEST_TAG..HEAD")

            if echo "$COMMITS" | grep -qE '^(feat|fix|refactor|perf|docs|style|test|build|ci|chore)(\(.+\))?!:|BREAKING CHANGE:'; then
              echo "✅ Breaking change properly declared in commit message"
              echo "   Release-please will bump major version"
              exit 0
            else
              echo ""
              echo "::error::Breaking API changes detected but not declared in commits!"
              echo ""
              echo "To fix, use one of these conventional commit formats:"
              echo "  feat!: description of breaking change"
              echo "  fix!: description of breaking change"
              echo "  feat: description"
              echo ""
              echo "  BREAKING CHANGE: explanation of what breaks"
              echo ""
              echo "This ensures release-please creates a major version bump."
              exit 1
            fi
          else
            echo "✅ No breaking API changes detected"
            if [ -n "$APIDIFF_OUT" ]; then
              echo ""
              echo "Compatible changes:"
              echo "$APIDIFF_OUT"
            fi
          fi

  pr-title:
    name: PR Title Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check PR title is not conventional commit format
        env:
          TITLE: ${{ github.event.pull_request.title }}
          PR_USER: ${{ github.event.pull_request.user.login }}
        run: |
          # Exempt release-please PRs (they use chore(main): release X.Y.Z)
          if echo "$TITLE" | grep -qE "^chore\(main\): release [0-9]"; then
            echo "✅ Release-please PR exempt from title check"
            exit 0
          fi

          # Exempt Dependabot PRs (they use conventional commit format by default)
          if [[ "$PR_USER" == "dependabot[bot]" ]]; then
            echo "✅ Dependabot PR exempt from title check"
            exit 0
          fi

          PATTERN="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?:"
          if echo "$TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title should NOT use conventional commit format."
            echo "Use descriptive titles (e.g., 'Add date parsing') not 'feat(date): ...'"
            echo "Conventional commits are for commit messages only."
            exit 1
          fi
          echo "✅ PR title valid: $TITLE"

  commit-type:
    name: Commit Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check feat/fix commits touch library code
        run: |
          # Library packages that constitute the public module
          LIB_PATTERN='^(charset|converter|decoder|encoder|gedcom|merge|parser|validator|version)/'

          FAILED=0
          for SHA in $(git log --format="%H" origin/main..HEAD); do
            SUBJECT=$(git log -1 --format="%s" "$SHA")

            # Reject malformed conventional commits where ! appears before scope
            if echo "$SUBJECT" | grep -qE '^(feat|fix)!\('; then
              echo "::error::Commit '$SUBJECT' has malformed format — '!' must come after the scope."
              echo "  Expected: type(scope)!: description"
              FAILED=1
              continue
            fi

            # Only check feat: and fix: commits (including scoped variants)
            if ! echo "$SUBJECT" | grep -qE '^(feat|fix)(\(.+\))?!?:'; then
              continue
            fi

            # Check if at least one changed file is in a library package
            FILES=$(git diff-tree --no-commit-id --name-only -r "$SHA")
            if ! echo "$FILES" | grep -qE "$LIB_PATTERN"; then
              echo "::error::Commit '$SUBJECT' uses feat/fix type but touches no library code."
              echo "  feat/fix are reserved for library changes (what users consume)."
              echo "  Use ci, build, docs, refactor, etc. for non-library changes."
              echo "  Files changed:"
              echo "$FILES" | sed 's/^/    /'
              echo ""
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "✅ All feat/fix commits touch library code"

  # Gate job for branch protection - only require this one check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test, coverage, lint, format, dependency-review, security, build-examples, api-compatibility, pr-title, commit-type]
    if: always()
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check all jobs passed
        run: |
          # pr-title is skipped on push events, which is expected
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ Some jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ Some jobs were cancelled"
            exit 1
          fi
          echo "✅ All CI jobs passed"
