name: Nightly

on:
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

# Restrict default GITHUB_TOKEN permissions (principle of least privilege).
# Per-job permissions scope additional writes where they're needed.
permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./parser
            fuzz: ^FuzzParse$
            time: 2m
          - package: ./parser
            fuzz: ^FuzzParseLine$
            time: 2m
          - package: ./gedcom
            fuzz: ^FuzzParseDate$
            time: 2m

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'
        cache: true

    - name: Run ${{ matrix.fuzz }}
      # Retry once on the "context deadline exceeded" race, where Go's fuzz
      # coordinator cancels an in-flight iteration right at the -fuzztime
      # boundary on slow/contended runners. A real failing input (which writes
      # to testdata/fuzz/...) still fails immediately on the first attempt.
      run: |
        set -o pipefail
        run_fuzz() {
          go test ${{ matrix.package }} -fuzz=${{ matrix.fuzz }} \
            -fuzztime=${{ matrix.time }} -timeout=0 2>&1 | tee fuzz.out
        }
        if run_fuzz; then exit 0; fi
        if grep -q "context deadline exceeded" fuzz.out \
           && ! grep -q "Failing input written" fuzz.out; then
          echo "::warning::Fuzztime-deadline race detected; retrying once."
          run_fuzz
        else
          exit 1
        fi

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-corpus-${{ matrix.fuzz }}
        path: '**/testdata/fuzz/**'
        retention-days: 30

  security:
    name: Security Scan (Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
      with:
        go-version: '1.26'

    - name: Run govulncheck
      uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1
      with:
        go-version-file: go.mod
        repo-checkout: false
        output-format: sarif
        output-file: govulncheck-results.sarif

    - name: Upload govulncheck results
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      if: success() || failure()
      with:
        sarif_file: govulncheck-results.sarif
        category: govulncheck

    - name: Run gosec
      uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # master (docker: 2.25.0)
      with:
        args: '-no-fail -fmt sarif -out gosec-results.sarif ./...'

    - name: Upload gosec results
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      if: success() || failure()
      with:
        sarif_file: gosec-results.sarif
        category: gosec

    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      if: (success() || failure()) && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: trivy-results.sarif
        category: trivy

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [fuzz, security]
    if: failure() && github.event_name == 'schedule'
    permissions:
      contents: read
      issues: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Create issue on failure
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Check if an open nightly failure issue already exists
        EXISTING=$(gh issue list --label "nightly-failure" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING" ]; then
          gh issue comment "$EXISTING" --body "Nightly workflow failed again on $(date -u +%Y-%m-%d).

        [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          echo "Commented on existing issue #$EXISTING"
          exit 0
        fi

        gh issue create \
          --title "Nightly workflow failure ($(date -u +%Y-%m-%d))" \
          --label "nightly-failure" \
          --body "The nightly workflow failed on $(date -u +%Y-%m-%d).

        **Fuzz testing**: ${{ needs.fuzz.result }}
        **Security scan**: ${{ needs.security.result }}

        [View full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

        ---
        This issue was created automatically. Close it once the failure is resolved."
