name: Release Please

on:
  push:
    branches:
      - main

# Restrict default GITHUB_TOKEN permissions (principle of least privilege).
# Release-please needs write access to create release PRs and tags.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: go
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Trigger pkg.go.dev indexing after release
  publish-docs:
    name: Trigger pkg.go.dev
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    steps:
      - name: Trigger pkg.go.dev indexing
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Triggering pkg.go.dev for version $VERSION..."
          curl -f "https://proxy.golang.org/github.com/cacack/gedcom-go/@v/$VERSION.info" || true
          curl -f "https://sum.golang.org/lookup/github.com/cacack/gedcom-go@$VERSION" || true
          echo "Indexing request sent to pkg.go.dev"
          echo "Documentation will be available at: https://pkg.go.dev/github.com/cacack/gedcom-go@$VERSION"
