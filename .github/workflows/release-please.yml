name: Release Please

on:
  push:
    branches:
      - main

# Restrict default GITHUB_TOKEN permissions (principle of least privilege).
# Release-please needs write access to create release PRs and tags.
permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: go
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Trigger pkg.go.dev indexing after release
  publish-docs:
    name: Trigger pkg.go.dev
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trigger pkg.go.dev indexing
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
        run: |
          MODULE=$(awk '/^module / {print $2}' go.mod)
          echo "Triggering pkg.go.dev for $MODULE@$VERSION..."
          curl -f "https://proxy.golang.org/$MODULE/@v/$VERSION.info" || true
          curl -f "https://sum.golang.org/lookup/$MODULE@$VERSION" || true
          echo "Indexing request sent to pkg.go.dev"
          echo "Documentation will be available at: https://pkg.go.dev/$MODULE@$VERSION"
